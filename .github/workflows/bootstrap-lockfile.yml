name: Bootstrap lockfile (docs)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate package-lock.json
        working-directory: docs
        run: |
          npm install

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/package-lock.json docs/package.json
          git commit -m "Add npm lockfile and pin zod v3 for Astro/Starlight" || echo "No changes"
          git push
